<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Contact Us | White Water Rafting</title>

  <meta name="description" content="Contact White Water Rafting to book your adventure, ask questions, or get more information about our trips.">
  <meta name="author" content="Jonathan Mera">

  <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>

<header>
  <img src="images/logo.png" alt="Rafting Logo" width="100">

  <nav>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About Us</a></li>
      <li><a href="trips.html">Trips</a></li>
      <li><a href="contact.html">Contact Us</a></li>
    </ul>
  </nav>
</header>

<main>

  <h1>Contact Us</h1>

  
  <section class="company-info">
    <h2>Contact Information</h2>

    <p>123 Main River Street</p>
    <p>Bountiful, Utah</p>
    <p>+1 345 679 2647</p>
    <p>info@whitewater.com</p>
  </section>

  
  <section class="contact-container">
    <h2>Send Us a Message</h2>

    <div class="map">
      <iframe 
        src="https://www.google.com/maps/embed?pb=!1m18..."
        width="300" height="250"
        loading="lazy">
      </iframe>
    </div>

    <form>

      <label for="name">Name:</label>
      <input type="text" id="name" name="name" required>

      <label for="email">Email:</label>
      <input type="email" id="email" name="email" required>

      <p>Message Purpose:</p>

      <label>
        <input type="radio" name="purpose" value="general" required>
        General Inquiry
      </label>

      <label>
        <input type="radio" name="purpose" value="reservation">
        Reservation Question
      </label>

      <label>
        <input type="radio" name="purpose" value="suggestion">
        Website Suggestion
      </label>

      <label for="message">Message:</label>
      <textarea id="message" name="message" rows="4"></textarea>

      <label>
        <input type="checkbox" name="subscribe">
        Please subscribe me to the monthly newsletter
      </label>

      <button type="submit">Get in Touch!</button>

    </form>
  </section>

  <!-- EMPLOYEES -->
  <section>
    <h2>We Are Here to Serve You</h2>

    <div class="employees">

      <figure>
        <img src="images/employee1.jpg" alt="John - Guide">
        <figcaption>John - Guide</figcaption>
      </figure>

      <figure>
        <img src="images/employee2.jpg" alt="Sarah - Manager">
        <figcaption>Sarah - Manager</figcaption>
      </figure>

      <figure>
        <img src="images/employee3.jpg" alt="Mike - Instructor">
        <figcaption>Mike - Instructor</figcaption>
      </figure>

    </div>
  </section>

</main>

<footer>
  <p>©2026 White Water Rafting Co. | Jonathan Mera</p>

  <nav class="socialmedia">
    <a href="https://facebook.com" target="_blank">
      <img src="images/facebook.svg" alt="Facebook">
    </a>

    <a href="https://linkedin.com" target="_blank">
      <img src="images/linkedin.svg" alt="LinkedIn">
    </a>

    <a href="https://instagram.com" target="_blank">
      <img src="images/instagram.svg" alt="Instagram">
    </a>
  </nav>
</footer>

</body>
</html>
